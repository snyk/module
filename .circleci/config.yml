version: 2.1

orbs:
  prodsec: snyk/prodsec-orb@1

defaults: &defaults
  resource_class: small
  docker:
    - image: cimg/node:24.16
  working_directory: ~/module

commands:
  setup_snyk_npm_user:
    steps:
      - run:
          name: Create Snyk NPM credentials file
          command: echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" >> .npmrc

  install_dependencies:
    steps:
      - run:
          name: Install dependencies
          command: npm install
      - persist_to_workspace:
          root: .
          paths:
            - node_modules/

  checkout_and_install:
    steps:
      - checkout
      - setup_snyk_npm_user
      - install_dependencies

jobs:
  lint:
    <<: *defaults
    steps:
      - checkout_and_install
      - attach_workspace:
          at: ~/module
      - run:
          name: Lint
          command: npm run lint

  security-scans:
    <<: *defaults
    steps:
      - checkout_and_install
      - attach_workspace:
          at: ~/module
      - prodsec/security_scans:
          mode: auto
          release-branch: master
          open-source-additional-arguments: --exclude=test
          iac-scan: disabled
  test:
    <<: *defaults
    steps:
      - checkout_and_install
      - attach_workspace:
          at: ~/module
      - run:
          name: Run tests
          command: npm run test

  release:
    <<: *defaults
    steps:
      - checkout_and_install
      - run:
          name: Release on GitHub
          command: |
            export NPM_ID_TOKEN=$(circleci run oidc get --claims '{"aud": "npm:registry.npmjs.org"}')
            npx semantic-release@25.0.3

workflows:
  version: 2
  CICD:
    jobs:
      - prodsec/secrets-scan:
          name: Scan repository for secrets
          context:
            - snyk-bot-slack
          channel: snyk-vuln-alerts-sca
          filters:
            branches:
              ignore:
                - master

      - security-scans:
          name: Security Scans
          context:
            - open_source-managed
            - nodejs-install

      - lint:
          name: Lint
          context:
            - nodejs-install
          filters:
            branches:
              ignore:
                - master

      - test:
          name: Test
          context:
            - snyk-docker-build
            - nodejs-install

      - release:
          name: Release
          context:
            - github-release
            - nodejs-install
          requires:
            - Test
          filters:
            branches:
              only:
                - master
